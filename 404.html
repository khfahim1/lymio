<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>404 · Lymio</title>
<style>
  html,body{margin:0;height:100%;background:#0a0a0f;color:#e6e8ee;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
  .box{max-width:460px;}
  .code{font-family:'Orbitron',monospace;font-size:3rem;color:#f5c842;margin:0 0 .25rem;letter-spacing:.05em;}
  h1{font-size:1.15rem;margin:.25rem 0 .75rem;font-weight:600;}
  p{color:#9aa0a6;font-size:.9rem;margin:0 0 1.25rem;line-height:1.5;}
  a.btn{display:inline-block;background:linear-gradient(135deg,#f5c842,#e0a800);color:#0a0a0f;padding:.7rem 1.4rem;border-radius:8px;text-decoration:none;font-weight:700;letter-spacing:.04em;}
</style>
</head>
<body>
<div class="box">
  <div class="code" id="code">404</div>
  <h1 id="title">Page Not Found</h1>
  <p id="msg">The page you're looking for doesn't exist.</p>
  <a class="btn" id="cta" href="/">Back to Home</a>
</div>
<script>
  (function(){
    var path = (window.location.pathname || "").toLowerCase();
    var isApk = path === "/lymio.apk" || path === "/lymio.apk/";

    if (isApk) {
      var target = "https://github.com/khfahim1/lymio/releases/download/v1.0.0/Lymio.apk";
      document.getElementById("code").textContent = "↓";
      document.getElementById("title").textContent = "Downloading Lymio…";
      document.getElementById("msg").innerHTML = 'If the download doesn\'t start automatically, <a id="manual" href="' + target + '" style="color:#f5c842;">click here</a>.';
      var cta = document.getElementById("cta");
      cta.textContent = "Download APK";
      cta.setAttribute("href", target);
      try { window.location.replace(target); } catch(e) { window.location.href = target; }
      return;
    }
  })();
</script>
</body>
</html>
